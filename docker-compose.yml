services:
  postgres:
    image: postgres:16-alpine
    container_name: knowflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-knowflow}
      POSTGRES_PASSWORD: ${PGPASSWORD:-knowflow_secret}
      POSTGRES_DB: ${PGDATABASE:-knowflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-knowflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: knowflow-redis
    restart: unless-stopped
    # Host 6380 evita conflito com outro Redis/serviço já na 6379 (ex.: Redis local).
    # Dentro da rede Compose o serviço continua em redis:6379 (REDIS_URL do server).
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: knowflow-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PGHOST: postgres
      PGUSER: ${PGUSER:-knowflow}
      PGPASSWORD: ${PGPASSWORD:-knowflow_secret}
      PGDATABASE: ${PGDATABASE:-knowflow}
      PGPORT: "5432"
      REDIS_URL: redis://redis:6379
      # Postgres do Compose não aceita SSL (evita "does not support SSL connections").
      DATABASE_SSL: "false"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: knowflow-client
    restart: unless-stopped
    ports:
      - "3005:80"
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
