name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependências do servidor
        working-directory: server
        run: npm ci

      - name: Rodar testes do servidor
        working-directory: server
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-ci

  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependências do cliente
        working-directory: client
        run: npm ci

      - name: Rodar testes do cliente
        working-directory: client
        run: npm test
        env:
          VITE_API_URL: http://localhost:3000/api

  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    needs: client-tests

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependências
        working-directory: client
        run: npm ci

      - name: Build de produção
        working-directory: client
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.up.railway.app/api
